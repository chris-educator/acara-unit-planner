<html lang="en">
  <head>

      name="description"
      content="Build a focused 3–5 lesson mini-unit with starters, main activities, exit tickets, and a short assessment — preview and edit before you export."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<!-- appstax-pwa -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Micro-Unit Starter Kit | EdStack for Teachers</title>
    <script>
      (function () {
        var KEY = 'acara-unit-planner-theme'
        var pref = 'system'
        try {
          var stored = localStorage.getItem(KEY)
          if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored
        } catch (e) {}
        var dark =
          pref === 'dark' ||
          (pref === 'system' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        var theme = dark ? 'dark' : 'light'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
